#Scaling Parameters
hpa:
  enabled: true
  targetCPUUtilizationPercentage: 70
  TargetAvgMemoryUtilization: 70
replicaCount: 1
maxReplicas: 1

## Resource Limits ##
resources:
 limits:
   cpu: "500m"
   memory: "0.5Gi"
 requests:
   cpu: "50m"
   memory: "128Mi"

## Ingress Configuration ##
ingress_internal:
  enabled: true
  hosts:
    whatsapp-intent-detection-service.tajawal-dev.internal:
      - /
ingress_public:
  enabled: false

# Istio Gateway
istio:
  enabled: true
  internal_gateway:
    enabled: true
    host:
      whatsapp-intent-detection-service.tajawal-dev.internal:
        - /
  virtualService:
    enabled: true

environment_variable:
  enabled: true
  data:
    APP: "whatsapp-intent-detection-service-dev"
    ENV: "dev"
    PORT: "80"
    HOST: "0.0.0.0"
    CLASSIFIER_BASE_URL: "http://ds-stage.alm-data.io"
    CLASSIFIER_TIMEOUT_MS: "2500"
    CLASSIFIER_RETRIES: "2"
    FALLBACK_INTENT: "live_agent_escalation"
